# Hardware target starting point for the vending PC selected for Debian 13.
# This file is intentionally not production-ready. Replace every
# REQUIRES_HARDWARE_CONFIRMATION value with bench-confirmed hardware facts.

machine:
  machine_id: flower-vending-debian13-target
  currency: RUB
  startup_state: SELF_TEST
  policies:
    critical_temperature_celsius: 8.0
    pickup_timeout_s: 60.0

runtime:
  health_poll_interval_s: 0.5
  validator_event_timeout_s: 0.05
  watchdog_timeout_s: 30.0
  event_log_limit: 100
  persist_applied_config: true
  seed_demo_data: true

ui:
  window_title: Flower Vending Kiosk
  kiosk_fullscreen: true

catalog:
  items:
    - product_id: roses_ecuador_7
      slot_id: A1
      name: roses_ecuador_7
      display_name: Roses Ecuador 7 pcs.
      category: roses
      price_minor_units: 249000
      quantity: 4
      capacity: 8
      is_bouquet: false
      enabled: true
      temperature_profile: cooled
      metadata:
        short_description: Pilot catalog item. Replace with live assortment.
        image_path: products/roses-ecuador-7.jpg
        freshness_note: Loaded today
        size_label: 7 stems

persistence:
  sqlite_path: /var/lib/flower-vending/flower_vending.db
  busy_timeout_ms: 5000
  enable_wal: true
  synchronous: FULL

logging:
  level: INFO
  directory: /var/log/flower-vending
  filename: flower_vending.jsonl
  json: true
  stderr: true
  rotation:
    max_bytes: 10485760
    backup_count: 7

platform:
  target_os: linux
  kiosk_mode: true
  autostart_mode: systemd
  watchdog:
    enabled: true
    adapter: systemd_watchdog_extension
    policy:
      timeout_s: 5.0
      retry_count: 2
      retryable_faults: [command_timeout, transient_command_failure, communication_error]
      non_retryable_faults:
        - ambiguous_physical_result
        - physical_state_mismatch
        - reconciliation_required
        - unsupported_operation
        - configuration_error
        - hardware_confirmation_required
      require_manual_review_on_ambiguous_result: true
    settings:
      unit_name: flower-vending.service

simulator:
  enabled: false
  startup_scenario:
  scenario_suite: []
  accepted_bill_denominations_minor: [50000, 100000, 200000, 500000]
  quick_insert_bill_denominations_minor: [50000, 100000, 200000, 500000]
  change_inventory:
    100000: 10
    50000: 10
    10000: 20
    5000: 20
    1000: 50
  initial_temperature_celsius: 4.0
  initial_service_door_open: false
  initial_inventory_presence: true
  initial_inventory_confidence: 1.0
  initial_faults: []

devices:
  bill_validator:
    enabled: true
    driver: dbv300sd
    device_name: jcm_dbv300sd
    transport_kind: serial
    protocol_kind: serial
    poll_interval_s: 0.2
    startup_disable_acceptance: true
    fallback_disable_on_fault: true
    requires_hardware_confirmation: true
    accepted_denominations_minor: [50000, 100000, 200000, 500000]
    policy: &hardware_device_policy
      timeout_s: 5.0
      retry_count: 2
      retryable_faults: [command_timeout, transient_command_failure, communication_error]
      non_retryable_faults:
        - ambiguous_physical_result
        - physical_state_mismatch
        - reconciliation_required
        - unsupported_operation
        - configuration_error
        - hardware_confirmation_required
      require_manual_review_on_ambiguous_result: true
    serial:
      port: /dev/serial/by-id/REQUIRES_HARDWARE_CONFIRMATION
      baudrate: 9600
      bytesize: 8
      parity: N
      stopbits: 1
      read_timeout_s: 0.2
      write_timeout_s: 0.2

  change_dispenser:
    enabled: true
    driver: requires_hardware_confirmation
    device_name: change_dispenser_main
    mapping: payout_channel_main
    timeouts_ms:
      dispense: 15000
      status: 1000
    policy: *hardware_device_policy
    settings:
      transport: extension_point
    requires_hardware_confirmation: true

  motor_controller:
    enabled: true
    driver: requires_hardware_confirmation
    device_name: carousel_motor_main
    mapping: vend_motor_1
    timeouts_ms:
      vend: 10000
      home: 10000
    policy: *hardware_device_policy
    settings:
      transport: extension_point
    requires_hardware_confirmation: true

  cooling_controller:
    enabled: true
    driver: requires_hardware_confirmation
    device_name: chamber_cooling_main
    mapping: cooling_relay_1
    timeouts_ms:
      command: 1000
    policy: *hardware_device_policy
    settings:
      transport: extension_point
    requires_hardware_confirmation: true

  window_controller:
    enabled: true
    driver: requires_hardware_confirmation
    device_name: delivery_window_main
    mapping: delivery_window_1
    timeouts_ms:
      open: 8000
      close: 8000
    policy: *hardware_device_policy
    settings:
      transport: extension_point
    requires_hardware_confirmation: true

  temperature_sensor:
    enabled: true
    driver: requires_hardware_confirmation
    device_name: chamber_temperature_1
    mapping: temperature_sensor_1
    timeouts_ms:
      read: 1000
    policy: *hardware_device_policy
    settings:
      transport: extension_point
    requires_hardware_confirmation: true

  door_sensor:
    enabled: true
    driver: requires_hardware_confirmation
    device_name: service_door_sensor_1
    mapping: service_door_input
    timeouts_ms:
      read: 500
    policy: *hardware_device_policy
    settings:
      transport: extension_point
    requires_hardware_confirmation: true

  inventory_sensor:
    enabled: true
    driver: requires_hardware_confirmation
    device_name: slot_inventory_sensor_1
    mapping: slot_presence_bus
    timeouts_ms:
      read: 1000
    policy: *hardware_device_policy
    settings:
      transport: extension_point
    requires_hardware_confirmation: true

  position_sensor:
    enabled: true
    driver: requires_hardware_confirmation
    device_name: carousel_position_sensor_1
    mapping: position_sensor_bus
    timeouts_ms:
      read: 1000
    policy: *hardware_device_policy
    settings:
      transport: extension_point
    requires_hardware_confirmation: true
