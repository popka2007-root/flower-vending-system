machine:
  machine_id: flower-vending-sim-01
  currency: RUB
  startup_state: SELF_TEST
  policies:
    critical_temperature_celsius: 8.0
    cash_session_timeout_s: 180.0
    pickup_timeout_s: 60.0
    exact_change_policy: block_cash_sale

runtime:
  startup_self_test: true
  health_poll_interval_s: 0.5
  validator_event_timeout_s: 0.05
  watchdog_timeout_s: 30.0
  event_log_limit: 100
  persist_applied_config: true
  seed_demo_data: true

ui:
  window_title: Flower Vending Simulator
  kiosk_fullscreen: false
  show_simulator_controls: true
  default_operator_id: technician

catalog:
  items:
    - product_id: rose_red
      slot_id: A1
      name: rose_red
      display_name: Red Roses
      category: flowers
      price_minor_units: 500
      quantity: 4
      capacity: 8
      is_bouquet: false
      enabled: true
      temperature_profile: cooled
      metadata:
        color: red
    - product_id: tulip_white
      slot_id: A2
      name: tulip_white
      display_name: White Tulips
      category: flowers
      price_minor_units: 450
      quantity: 3
      capacity: 8
      is_bouquet: false
      enabled: true
      temperature_profile: cooled
      metadata:
        color: white
    - product_id: spring_bouquet
      slot_id: B1
      name: spring_bouquet
      display_name: Spring Bouquet
      category: bouquets
      price_minor_units: 900
      quantity: 2
      capacity: 4
      is_bouquet: true
      enabled: true
      temperature_profile: cooled
      metadata:
        style: mixed

persistence:
  sqlite_path: var/data/flower_vending_simulator.db
  busy_timeout_ms: 5000
  enable_wal: true
  synchronous: FULL

logging:
  level: DEBUG
  directory: var/log
  filename: flower_vending.simulator.jsonl
  json: true
  stderr: true
  rotation:
    max_bytes: 5242880
    backup_count: 3

platform:
  target_os: generic
  kiosk_mode: false
  autostart_mode: none
  watchdog:
    enabled: false
    adapter: simulator
    timeout_s: 30.0
    settings: {}

simulator:
  enabled: true
  startup_scenario:
  scenario_suite:
    - normal_sale
    - insufficient_change
    - bill_rejected
    - partial_payout
    - product_vend_failure
    - door_open
    - critical_temperature
    - inventory_mismatch
    - pickup_timeout_placeholder
  accepted_bill_denominations_minor: [100, 500, 1000]
  quick_insert_bill_denominations_minor: [100, 500, 1000]
  change_inventory:
    100: 10
    50: 10
  initial_temperature_celsius: 4.0
  initial_service_door_open: false
  initial_inventory_presence: true
  initial_inventory_confidence: 1.0
  initial_faults: []

devices:
  bill_validator:
    enabled: true
    driver: dbv300sd
    device_name: simulator_bill_validator_contract
    transport_kind: serial
    protocol_kind: serial
    poll_interval_s: 0.2
    startup_disable_acceptance: true
    fallback_disable_on_fault: true
    accepted_denominations_minor: [100, 500, 1000]
    serial:
      port: SIMULATOR
      baudrate: 9600
      bytesize: 8
      parity: N
      stopbits: 1
      read_timeout_s: 0.2
      write_timeout_s: 0.2

  change_dispenser:
    enabled: true
    driver: simulator
    device_name: mock_change_dispenser
    mapping: simulator_change_dispenser
    timeouts_ms:
      dispense: 100
    settings: {}
    requires_hardware_confirmation: false

  motor_controller:
    enabled: true
    driver: simulator
    device_name: mock_motor_controller
    mapping: simulator_motor
    timeouts_ms:
      vend: 100
      home: 100
    settings: {}
    requires_hardware_confirmation: false

  cooling_controller:
    enabled: true
    driver: simulator
    device_name: mock_cooling_controller
    mapping: simulator_cooling
    timeouts_ms:
      command: 100
    settings: {}
    requires_hardware_confirmation: false

  window_controller:
    enabled: true
    driver: simulator
    device_name: mock_window_controller
    mapping: simulator_window
    timeouts_ms:
      open: 100
      close: 100
    settings: {}
    requires_hardware_confirmation: false

  temperature_sensor:
    enabled: true
    driver: simulator
    device_name: mock_temperature_sensor
    mapping: simulator_temperature
    timeouts_ms:
      read: 100
    settings: {}
    requires_hardware_confirmation: false

  door_sensor:
    enabled: true
    driver: simulator
    device_name: mock_door_sensor
    mapping: simulator_door
    timeouts_ms:
      read: 100
    settings: {}
    requires_hardware_confirmation: false

  inventory_sensor:
    enabled: true
    driver: simulator
    device_name: mock_inventory_sensor
    mapping: simulator_inventory
    timeouts_ms:
      read: 100
    settings: {}
    requires_hardware_confirmation: false

  position_sensor:
    enabled: true
    driver: simulator
    device_name: mock_position_sensor
    mapping: simulator_position
    timeouts_ms:
      read: 100
    settings: {}
    requires_hardware_confirmation: false
