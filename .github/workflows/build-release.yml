name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # Required release gate: simulator-safe checks only. Bench hardware checks for
  # DBV-300-SD and other devices should live in a separate workflow once a stand exists.
  quality-checks:
    name: Simulator-safe quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0
      - name: Install simulator-safe quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-ui.txt
      - name: Run required simulator-safe project verification
        run: |
          # Covers config validation, unit/integration/simulator tests, diagnostics, and runtime scenarios.
          # Bench hardware validation will be added as a separate workflow when the stand exists.
          python scripts/verify_project.py
      - name: Run required ruff lint
        run: python -m ruff check .
      - name: Run non-blocking mypy baseline TODO
        continue-on-error: true
        run: |
          # TODO: Make mypy a required release gate once the strict typing baseline is fixed.
          python -m mypy src tests

  build-windows:
    needs: quality-checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ui.txt pyinstaller
      - name: Build portable exe
        run: python packaging/build_release.py windows-portable
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer exe
        run: python packaging/build_release.py windows-installer
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: artifacts/*.exe

  build-linux:
    needs: quality-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils libegl1 libgl1 libglib2.0-bin libxkbcommon0 patchelf
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ui.txt pyinstaller
      - name: Download appimagetool
        run: |
          curl -L -o appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          printf '#!/usr/bin/env bash\n"%s" --appimage-extract-and-run "$@"\n' "$PWD/appimagetool.AppImage" > appimagetool-wrapper.sh
          chmod +x appimagetool-wrapper.sh
      - name: Build Linux artifacts
        run: python packaging/build_release.py linux-appimage --appimagetool ./appimagetool-wrapper.sh
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            artifacts/*.AppImage
            artifacts/*.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-artifacts/**/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
